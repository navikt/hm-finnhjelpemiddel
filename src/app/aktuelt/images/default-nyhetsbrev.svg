<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#D6E8F7"/>
  <!-- subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#BDD5EC" stroke-width="0.8"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)"/>
  <!-- envelope icon centered -->
  <g transform="translate(400,225)" opacity="0.35">
    <rect x="-90" y="-60" width="180" height="120" rx="10" fill="none" stroke="#3A7FC1" stroke-width="7"/>
    <polyline points="-90,-60 0,20 90,-60" fill="none" stroke="#3A7FC1" stroke-width="7" stroke-linejoin="round"/>
  </g>
  <!-- label -->
  <text x="400" y="320" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#3A7FC1" opacity="0.5" letter-spacing="2">NYHETSBREV</text>
</svg>
